services:
  mongo:
    image: mongo:8.0
    container_name: edc_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - edc_network

  postgres:
    image: postgres:15
    container_name: edc_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edc_network

  minio:
    image: minio/minio:latest
    container_name: edc_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - edc_network

  identity-hub-vault:
    image: hashicorp/vault:1.15
    container_name: edc_identity_hub_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    ports:
      - "8200:8200"
    volumes:
      - ./runtime/identity-hub/vault-bootstrap:/vault/bootstrap:ro
    networks:
      - edc_network

  identity-hub:
    image: ${IDENTITY_HUB_IMAGE:-identity-hub:latest}
    build:
      context: ./identity-hub-src
      dockerfile: Dockerfile
    pull_policy: never
    container_name: edc_identity_hub
    platform: linux/amd64
    ports:
      - "8182:8182"
      - "10001:10001"
    environment:
      EDC_DATASOURCE_DEFAULT_URL: jdbc:postgresql://edc_postgres:5432/${POSTGRES_DB}
      EDC_DATASOURCE_DEFAULT_USER: ${POSTGRES_USER}
      EDC_DATASOURCE_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
      EDC_DATASOURCE_DEFAULT_DRIVER: org.postgresql.Driver
      EDC_DATASOURCE_DEFAULT_NAME: default
      EDC_IH_API_SUPERUSER_ID: ${IDENTITY_HUB_SUPERUSER_ID:-super-user}
      EDC_IH_API_SUPERUSER_KEY: ${IDENTITY_HUB_SUPERUSER_KEY:-change-me}
    volumes:
      - ./identity-hub/configuration:/app/configuration:ro
      - ./runtime/identity-hub/participants:/app/identity-hub/participants
      - ./runtime/identity-hub/shared:/app/identity-hub/shared
    depends_on:
      - identity-hub-vault
    networks:
      - edc_network

  backend:
    image: agrixelsupc/edc_studio_backend:latest
    container_name: edc_backend
    platform: linux/amd64
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      RUNTIME_PATH: ${RUNTIME_PATH}
      NETWORK_NAME: ${NETWORK_NAME}
      TYPE: ${TYPE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      IDENTITY_HUB_BASE_URL: ${IDENTITY_HUB_BASE_URL:-http://edc_identity_hub:8182/api/identity}
      IDENTITY_HUB_CREDENTIALS_BASE_URL: ${IDENTITY_HUB_CREDENTIALS_BASE_URL:-http://edc_identity_hub:10001/api/credentials}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime:/app/runtime
    depends_on:
      - mongo
      - postgres
      - minio
      - identity-hub
    networks:
      - edc_network

  frontend:
    image: agrixelsupc/edc_studio:latest
    container_name: edc_studio
    platform: linux/amd64
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - .env.frontend:/usr/share/nginx/html/assets/assets/.env
    networks:
      - edc_network

volumes:
  mongo_data:
  postgres_data:
  minio_data:

networks:
  edc_network:
    external: true
