
services:
  # --- Reverse proxy ---
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/vhost.d
      - /usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_conf:/etc/nginx/conf.d
      - acme_html:/usr/share/nginx/html
    networks:
      - edc_network
    restart: always

  letsencrypt-nginx-proxy-companion:
    image: jrcs/letsencrypt-nginx-proxy-companion
    container_name: letsencrypt-nginx-proxy-companion
    environment:
      - NGINX_PROXY_CONTAINER=nginx-proxy
    volumes:
      - nginx_certs:/etc/nginx/certs
      - nginx_conf:/etc/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme_data:/etc/acme.sh
      - acme_html:/usr/share/nginx/html
    depends_on:
      - nginx-proxy
    networks:
      - edc_network
    restart: always

  # --- Databases ---
  mongo:
    image: mongo:8.0
    container_name: edc_mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - edc_network

  postgres:
    image: postgres:15
    container_name: edc_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edc_network

  minio:
    image: minio/minio:latest
    container_name: edc-minio
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      VIRTUAL_HOST: ${VIRTUAL_HOST_MINIO}
      VIRTUAL_PORT: ${VIRTUAL_PORT_MINIO}
      LETSENCRYPT_HOST: ${VIRTUAL_HOST_MINIO}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - edc_network
    restart: always

  identity-hub-vault:
    image: hashicorp/vault:1.15
    container_name: edc_identity_hub_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    expose:
      - "8200"
    volumes:
      - ./runtime/identity-hub/vault-bootstrap:/vault/bootstrap:ro
    networks:
      - edc_network
    restart: always

  identity-hub:
    image: ${IDENTITY_HUB_IMAGE:-identity-hub:latest}
    build:
      context: ./identity-hub-src
      dockerfile: Dockerfile
    pull_policy: never
    container_name: edc_identity_hub
    platform: linux/amd64
    expose:
      - "8181"
      - "8182"
      - "10001"
    environment:
      EDC_DATASOURCE_DEFAULT_URL: jdbc:postgresql://edc_postgres:5432/${POSTGRES_DB}
      EDC_DATASOURCE_DEFAULT_USER: ${POSTGRES_USER}
      EDC_DATASOURCE_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
      EDC_DATASOURCE_DEFAULT_DRIVER: org.postgresql.Driver
      EDC_DATASOURCE_DEFAULT_NAME: default
      EDC_IH_API_SUPERUSER_ID: ${IDENTITY_HUB_SUPERUSER_ID:-super-user}
      EDC_IH_API_SUPERUSER_KEY: ${IDENTITY_HUB_SUPERUSER_KEY:-change-me}
    volumes:
      - ./identity-hub/configuration:/app/configuration:ro
      - ./runtime/identity-hub/participants:/app/identity-hub/participants
      - ./runtime/identity-hub/shared:/app/identity-hub/shared
    depends_on:
      - identity-hub-vault
    networks:
      - edc_network
    restart: always

  # --- Backend ---
  backend:
    image: agrixelsupc/edc_studio_backend:latest
    container_name: edc_backend
    platform: linux/amd64
    expose:
      - "8000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      RUNTIME_PATH: ${RUNTIME_PATH}
      NETWORK_NAME: ${NETWORK_NAME}
      TYPE: ${TYPE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      EDC_CONNECTOR_IMAGE: ${EDC_CONNECTOR_IMAGE:-itziarmensaupc/connector:0.0.6}
      IDENTITY_HUB_BASE_URL: ${IDENTITY_HUB_BASE_URL:-http://edc_identity_hub:8182/api/identity}
      IDENTITY_HUB_CREDENTIALS_BASE_URL: ${IDENTITY_HUB_CREDENTIALS_BASE_URL:-http://edc_identity_hub:10001/api/credentials}
      VIRTUAL_HOST: ${VIRTUAL_HOST_BACKEND}
      VIRTUAL_PORT: ${VIRTUAL_PORT_BACKEND}
      LETSENCRYPT_HOST: ${VIRTUAL_HOST_BACKEND}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime:/app/runtime
    depends_on:
      - mongo
      - postgres
      - minio
      - identity-hub
    networks:
      - edc_network
    restart: always

  # --- Frontend ---
  frontend:
    image: agrixelsupc/edc_studio:latest
    container_name: edc_studio
    platform: linux/amd64
    expose:
      - "3000"
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST_FRONTEND}
      VIRTUAL_PORT: ${VIRTUAL_PORT_FRONTEND}
      LETSENCRYPT_HOST: ${VIRTUAL_HOST_FRONTEND}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - .env.frontend:/usr/share/nginx/html/assets/assets/.env
    depends_on:
      - backend
    networks:
      - edc_network
    restart: always

volumes:
  mongo_data:
  postgres_data:
  minio_data:
  nginx_certs:
  nginx_conf:
  acme_data:
  acme_html:

networks:
  edc_network:
    external: true
